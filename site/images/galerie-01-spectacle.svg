<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1040">
  <defs>
    <linearGradient id="bg" x1="28.9%" y1="4.7%" x2="71.1%" y2="95.3%">
    <stop offset="0%" stop-color="#180d07"/>
    <stop offset="45%" stop-color="#2a1208"/>
    <stop offset="100%" stop-color="#0f0905"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="800" height="1040" fill="url(#bg)"/>

  <!-- circle -->
  <circle cx="400" cy="520" r="72" fill="none" stroke="rgba(194,139,54,0.8)" stroke-width="1.5"/>

  <!-- cross — horizontal bar -->
  <line x1="371" y1="520" x2="429" y2="520"
        stroke="rgba(194,139,54,0.8)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- cross — vertical bar -->
  <line x1="400" y1="491" x2="400" y2="549"
        stroke="rgba(194,139,54,0.8)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- label -->
  <text x="400" y="614" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="11" font-weight="400"
        letter-spacing="2" fill="rgba(194,139,54,0.7)">Spectacle vivant</text>
  <text x="400" y="630" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="9" font-weight="300"
        letter-spacing="3" fill="rgba(194,139,54,0.45)">Ajouter une photo</text>
</svg>