<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="bg" x1="14.6%" y1="14.6%" x2="85.4%" y2="85.4%">
    <stop offset="0%" stop-color="#0c0b09"/>
    <stop offset="55%" stop-color="#1e1a10"/>
    <stop offset="100%" stop-color="#0d0c09"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="800" height="520" fill="url(#bg)"/>

  <!-- circle -->
  <circle cx="400" cy="260" r="47" fill="none" stroke="rgba(194,139,54,0.8)" stroke-width="1.5"/>

  <!-- cross — horizontal bar -->
  <line x1="381" y1="260" x2="419" y2="260"
        stroke="rgba(194,139,54,0.8)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- cross — vertical bar -->
  <line x1="400" y1="241" x2="400" y2="279"
        stroke="rgba(194,139,54,0.8)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- label -->
  <text x="400" y="329" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="11" font-weight="400"
        letter-spacing="2" fill="rgba(194,139,54,0.7)">Jam de contact</text>
  <text x="400" y="345" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="9" font-weight="300"
        letter-spacing="3" fill="rgba(194,139,54,0.45)">Ajouter une photo</text>
</svg>