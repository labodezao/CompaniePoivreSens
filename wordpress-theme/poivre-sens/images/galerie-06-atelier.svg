<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 440">
  <defs>
    <linearGradient id="bg" x1="30%" y1="5%" x2="70%" y2="95%">
      <stop offset="0%"   stop-color="#241808"/>
      <stop offset="50%"  stop-color="#1c1309"/>
      <stop offset="100%" stop-color="#170f07"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="44%">
      <stop offset="0%"   stop-color="rgba(194,139,54,0.14)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="440" fill="url(#bg)"/>
  <rect width="1400" height="440" fill="url(#glow)"/>

  <!-- Atelier pédagogique : 3 personnes en cercle de transmission -->

  <!-- Personne 1 (gauche) -->
  <circle cx="448"  cy="195" r="24" fill="none" stroke="rgba(194,139,54,0.58)" stroke-width="2"/>
  <path d="M 448 219 C 440 250, 436 272, 442 298"
        fill="none" stroke="rgba(194,139,54,0.44)" stroke-width="2" stroke-linecap="round"/>

  <!-- Personne 2 (centre — pédagogue, légèrement plus grande) -->
  <circle cx="700"  cy="178" r="30" fill="none" stroke="rgba(194,139,54,0.78)" stroke-width="2"/>
  <path d="M 700 208 C 694 244, 690 266, 700 295"
        fill="none" stroke="rgba(194,139,54,0.58)" stroke-width="2" stroke-linecap="round"/>
  <!-- Rayonnement du savoir : petits traits autour du cercle -->
  <line x1="700" y1="148" x2="700" y2="128" stroke="rgba(194,139,54,0.5)"  stroke-width="2"   stroke-linecap="round"/>
  <line x1="720" y1="152" x2="733" y2="136" stroke="rgba(194,139,54,0.4)"  stroke-width="1.8" stroke-linecap="round"/>
  <line x1="680" y1="152" x2="667" y2="136" stroke="rgba(194,139,54,0.4)"  stroke-width="1.8" stroke-linecap="round"/>
  <line x1="732" y1="164" x2="750" y2="154" stroke="rgba(194,139,54,0.3)"  stroke-width="1.5" stroke-linecap="round"/>
  <line x1="668" y1="164" x2="650" y2="154" stroke="rgba(194,139,54,0.3)"  stroke-width="1.5" stroke-linecap="round"/>
  <line x1="730" y1="178" x2="752" y2="178" stroke="rgba(194,139,54,0.22)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="670" y1="178" x2="648" y2="178" stroke="rgba(194,139,54,0.22)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Personne 3 (droite) -->
  <circle cx="952"  cy="195" r="24" fill="none" stroke="rgba(194,139,54,0.58)" stroke-width="2"/>
  <path d="M 952 219 C 960 250, 964 272, 958 298"
        fill="none" stroke="rgba(194,139,54,0.44)" stroke-width="2" stroke-linecap="round"/>

  <!-- Liens de transmission entre les personnes -->
  <line x1="472" y1="192" x2="670" y2="184"
        stroke="rgba(194,139,54,0.28)" stroke-width="1.5" stroke-dasharray="5 8"/>
  <line x1="730" y1="184" x2="928" y2="192"
        stroke="rgba(194,139,54,0.28)" stroke-width="1.5" stroke-dasharray="5 8"/>

  <!-- Label -->
  <text x="700" y="358" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="11" font-weight="400"
        letter-spacing="2" fill="rgba(194,139,54,0.75)">Atelier pédagogique</text>
  <text x="700" y="376" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="9" font-weight="300"
        letter-spacing="3" fill="rgba(194,139,54,0.45)">Ajouter une photo</text>
</svg>
