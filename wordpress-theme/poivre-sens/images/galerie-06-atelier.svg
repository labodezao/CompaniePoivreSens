<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 440">
  <defs>
    <linearGradient id="bg" x1="32.9%" y1="3.0%" x2="67.1%" y2="97.0%">
    <stop offset="0%" stop-color="#120a08"/>
    <stop offset="50%" stop-color="#201510"/>
    <stop offset="100%" stop-color="#0d0b09"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1400" height="440" fill="url(#bg)"/>

  <!-- circle -->
  <circle cx="700" cy="220" r="40" fill="none" stroke="rgba(194,139,54,0.8)" stroke-width="1.5"/>

  <!-- cross — horizontal bar -->
  <line x1="684" y1="220" x2="716" y2="220"
        stroke="rgba(194,139,54,0.8)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- cross — vertical bar -->
  <line x1="700" y1="204" x2="700" y2="236"
        stroke="rgba(194,139,54,0.8)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- label -->
  <text x="700" y="282" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="11" font-weight="400"
        letter-spacing="2" fill="rgba(194,139,54,0.7)">Atelier pédagogique</text>
  <text x="700" y="298" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="9" font-weight="300"
        letter-spacing="3" fill="rgba(194,139,54,0.45)">Ajouter une photo</text>
</svg>