<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1040">
  <defs>
    <linearGradient id="bg" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#321e08"/>
      <stop offset="50%"  stop-color="#1e1208"/>
      <stop offset="100%" stop-color="#110c07"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="42%" r="42%">
      <stop offset="0%"   stop-color="rgba(220,160,60,0.18)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <rect width="800" height="1040" fill="url(#bg)"/>
  <rect width="800" height="1040" fill="url(#spot)"/>

  <!-- Spotlight beams from above (lumière de scène) -->
  <path d="M 290 60 L 230 580" stroke="rgba(194,139,54,0.09)" stroke-width="80" stroke-linecap="round"/>
  <path d="M 400 40 L 400 565" stroke="rgba(194,139,54,0.12)" stroke-width="65" stroke-linecap="round"/>
  <path d="M 510 60 L 570 580" stroke="rgba(194,139,54,0.09)" stroke-width="80" stroke-linecap="round"/>

  <!-- Stage arch -->
  <path d="M 115 600 Q 400 458 685 600"
        fill="none" stroke="rgba(194,139,54,0.7)" stroke-width="2.5"/>
  <!-- Left curtain -->
  <path d="M 88 265 C 100 380, 108 495, 115 600"
        fill="none" stroke="rgba(194,139,54,0.45)" stroke-width="2" stroke-linecap="round"/>
  <!-- Right curtain -->
  <path d="M 712 265 C 700 380, 692 495, 685 600"
        fill="none" stroke="rgba(194,139,54,0.45)" stroke-width="2" stroke-linecap="round"/>

  <!-- Two dancer figures in silhouette (lignes courbes, deux corps en scène) -->
  <!-- Dancer A -->
  <path d="M 318 512 C 314 472, 330 448, 345 425 C 360 402, 376 412, 380 438"
        fill="none" stroke="rgba(194,139,54,0.68)" stroke-width="2" stroke-linecap="round"/>
  <!-- Dancer B (mirrored energy) -->
  <path d="M 482 512 C 486 472, 470 448, 455 425 C 440 402, 424 412, 420 438"
        fill="none" stroke="rgba(194,139,54,0.68)" stroke-width="2" stroke-linecap="round"/>
  <!-- Meeting point / dialogue -->
  <path d="M 380 438 Q 400 418 420 438"
        fill="none" stroke="rgba(194,139,54,0.45)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="400" cy="430" r="3" fill="rgba(194,139,54,0.7)"/>

  <!-- Label -->
  <text x="400" y="690" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="11" font-weight="400"
        letter-spacing="2" fill="rgba(194,139,54,0.75)">Spectacle vivant</text>
  <text x="400" y="710" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="9" font-weight="300"
        letter-spacing="3" fill="rgba(194,139,54,0.45)">Ajouter une photo</text>
</svg>
