<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1040">
  <defs>
    <linearGradient id="bg" x1="40%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="#0f2018"/>
      <stop offset="50%"  stop-color="#0c1c14"/>
      <stop offset="100%" stop-color="#081410"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="46%" r="46%">
      <stop offset="0%"   stop-color="rgba(90,148,112,0.16)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <rect width="800" height="1040" fill="url(#bg)"/>
  <rect width="800" height="1040" fill="url(#glow)"/>

  <!-- Cordes d'instrument (luthier) — 4 cordes tendues légèrement courbées -->
  <path d="M 205 330 Q 400 282 595 330"
        fill="none" stroke="rgba(90,148,112,0.72)" stroke-width="1.8"/>
  <path d="M 192 395 Q 400 347 608 395"
        fill="none" stroke="rgba(90,148,112,0.65)" stroke-width="1.8"/>
  <path d="M 192 460 Q 400 412 608 460"
        fill="none" stroke="rgba(90,148,112,0.58)" stroke-width="1.8"/>
  <path d="M 205 525 Q 400 477 595 525"
        fill="none" stroke="rgba(90,148,112,0.5)" stroke-width="1.8"/>

  <!-- Sillets (nut gauche et droite) -->
  <line x1="198" y1="326" x2="198" y2="528"
        stroke="rgba(90,148,112,0.55)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="602" y1="326" x2="602" y2="528"
        stroke="rgba(90,148,112,0.55)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Chevalet central (bridge) -->
  <path d="M 390 326 L 385 430 L 390 528 M 410 326 L 415 430 L 410 528"
        fill="none" stroke="rgba(90,148,112,0.42)" stroke-width="2" stroke-linecap="round"/>

  <!-- Ondes sonores émanant (la musique rayonne vers le bas) -->
  <ellipse cx="400" cy="580" rx="62" ry="14"
           fill="none" stroke="rgba(90,148,112,0.28)" stroke-width="1.5" stroke-dasharray="3 6"/>
  <ellipse cx="400" cy="600" rx="92" ry="22"
           fill="none" stroke="rgba(90,148,112,0.18)" stroke-width="1" stroke-dasharray="3 8"/>
  <ellipse cx="400" cy="622" rx="122" ry="30"
           fill="none" stroke="rgba(90,148,112,0.1)" stroke-width="1" stroke-dasharray="3 10"/>

  <!-- Label -->
  <text x="400" y="680" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="11" font-weight="400"
        letter-spacing="2" fill="rgba(90,148,112,0.85)">Ewen d'Aviau</text>
  <text x="400" y="700" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="9" font-weight="300"
        letter-spacing="3" fill="rgba(90,148,112,0.5)">Ajouter un portrait</text>
</svg>
