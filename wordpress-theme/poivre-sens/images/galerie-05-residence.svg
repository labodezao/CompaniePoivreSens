<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 440">
  <defs>
    <linearGradient id="bg" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#0c1c0e"/>
      <stop offset="50%"  stop-color="#102218"/>
      <stop offset="100%" stop-color="#0c1c0e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="58%" r="38%">
      <stop offset="0%"   stop-color="rgba(90,148,112,0.14)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="440" fill="url(#bg)"/>
  <rect width="1400" height="440" fill="url(#glow)"/>

  <!-- Branche organique — laboratoire artistique, croissance et exploration -->
  <!-- Tige principale -->
  <path d="M 700 368 C 698 338, 694 308, 700 270 C 706 232, 700 198, 700 158"
        fill="none" stroke="rgba(90,148,112,0.68)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Branche gauche 1 -->
  <path d="M 700 295 C 656 280, 622 258, 598 233"
        fill="none" stroke="rgba(90,148,112,0.58)" stroke-width="2" stroke-linecap="round"/>
  <!-- Branche droite 1 -->
  <path d="M 700 275 C 744 260, 778 238, 802 212"
        fill="none" stroke="rgba(90,148,112,0.58)" stroke-width="2" stroke-linecap="round"/>

  <!-- Branche gauche 2 -->
  <path d="M 700 228 C 655 215, 630 198, 612 178"
        fill="none" stroke="rgba(90,148,112,0.48)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Branche droite 2 -->
  <path d="M 700 218 C 745 205, 768 188, 784 170"
        fill="none" stroke="rgba(90,148,112,0.48)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Bourgeons en croissance aux pointes -->
  <circle cx="598" cy="231" r="5.5" fill="rgba(90,148,112,0.68)"/>
  <circle cx="802" cy="210" r="5.5" fill="rgba(90,148,112,0.68)"/>
  <circle cx="612" cy="176" r="4.5" fill="rgba(90,148,112,0.62)"/>
  <circle cx="784" cy="168" r="4.5" fill="rgba(90,148,112,0.62)"/>
  <!-- Bourgeon sommital (en pleine pousse) -->
  <circle cx="700" cy="155" r="6.5" fill="rgba(90,148,112,0.72)"/>

  <!-- Racines (enracinée dans un espace, une résidence de création) -->
  <path d="M 700 368 C 642 378, 598 386, 556 380"
        fill="none" stroke="rgba(90,148,112,0.3)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 700 368 C 758 378, 802 384, 844 378"
        fill="none" stroke="rgba(90,148,112,0.3)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Label -->
  <text x="700" y="410" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="11" font-weight="400"
        letter-spacing="2" fill="rgba(90,148,112,0.85)">En résidence</text>
  <text x="700" y="428" text-anchor="middle"
        font-family="Arial,sans-serif" font-size="9" font-weight="300"
        letter-spacing="3" fill="rgba(90,148,112,0.5)">Ajouter une photo</text>
</svg>
